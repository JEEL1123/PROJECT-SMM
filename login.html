<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BrandBoost | Login & Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #0f172a;
    --dark: #020617;
    --primary: #38bdf8;
    --text: #e5e7eb;
    --muted: #cbd5f5;
    --card: #f1f5f9;
    --ink: #020617;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Segoe UI, Arial;
}

body {
    background: var(--bg);
    color: var(--text);
}

/* Header */
header {
    background: rgba(2, 6, 23, .9);
    padding: 18px 8%;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    color: var(--primary);
}

nav a {
    color: var(--muted);
    margin-left: 16px;
    text-decoration: none;
}

/* Container */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

/* Form Box */
.form-box {
    background: var(--card);
    color: var(--ink);
    padding: 40px;
    border-radius: 16px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.form-box h2 {
    text-align: center;
    margin-bottom: 20px;
}

/* Inputs */
input[type="email"],
input[type="password"],
input[type="text"] {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: var(--primary);
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

/* Toggle Text */
.toggle {
    text-align: center;
    margin-top: 15px;
}

.toggle label {
    color: var(--primary);
    cursor: pointer;
}

/* Hide checkbox */
#toggle {
    display: none;
}

/* Hide signup by default */
.signup {
    display: none;
}

/* When checked → show signup */
#toggle:checked ~ .container .login {
    display: none;
}

#toggle:checked ~ .container .signup {
    display: block;
}
</style>
</head>

<body>

<header>
    <h1>BrandBoost</h1>
    <nav>
        <a href="home.html">Home</a>
        <a href="#">Services</a>
    </nav>
</header>

<!-- Hidden Toggle -->
<input type="checkbox" id="toggle">

<div class="container">

    <!-- LOGIN -->
    <div class="form-box login">
        <h2>Login</h2>
        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="toggle">
            Don't have an account?
            <label for="toggle">Sign Up</label>
        </div>
    </div>

    <!-- SIGNUP -->
    <div class="form-box signup">
        <h2>Sign Up</h2>
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>

        <div class="toggle">
            Already have an account?
            <label for="toggle">Login</label>
        </div>
    </div>

</div>

</body>
</html>
